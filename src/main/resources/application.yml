spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:13306/consome?characterEncoding=UTF-8&serverTimezone=Asia/Seoul}
    username: ${DB_USER:consome}
    password: ${DB_PASSWORD:consome}
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: false
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:16379}
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

app:
  base-url: ${APP_BASE_URL:http://localhost:5173}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}
  admin:
    password: ${ADMIN_PASSWORD:}

logging:
  #level:
    #org.hibernate.SQL: debug

jwt:
  secret: ${JWT_SECRET:my-secret-key-for-dev-only-change-this-later}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:3600000}
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
